name: 🏗️ Build & Release BoutikManager

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════
  #  VÉRIFIER SI LA VERSION A CHANGÉ
  #  (on ne rebuild que si APP_VERSION est nouvelle)
  # ══════════════════════════════════════════
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.read.outputs.version }}
      should_release: ${{ steps.read.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: 🔖 Lire APP_VERSION depuis app.py
        id: read
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r\"APP_VERSION = '([^']+)'\", open('app.py').read()); print(m.group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version détectée : v$VERSION"

          # Vérifier si le tag existe déjà sur GitHub
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "v$VERSION"; then
            echo "⚠️  Tag v$VERSION existe déjà — pas de nouvelle release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Nouvelle version v$VERSION — build + release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ══════════════════════════════════════════
  #  BUILD MAC
  # ══════════════════════════════════════════
  build-mac:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install flask werkzeug PySide6 pyinstaller

      - name: ⚙️ Compiler pour Mac (.app bundle)
        run: pyinstaller boutikmanager.spec --clean --noconfirm

      - name: 📦 Zipper le .app
        run: |
          cd dist
          zip -r BoutikManager-Mac.zip BoutikManager.app

      - name: 📤 Sauvegarder le build Mac
        uses: actions/upload-artifact@v4
        with:
          name: BoutikManager-Mac
          path: dist/BoutikManager-Mac.zip
          retention-days: 30

  # ══════════════════════════════════════════
  #  BUILD WINDOWS
  # ══════════════════════════════════════════
  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install flask werkzeug PySide6 pyinstaller

      - name: ⚙️ Compiler pour Windows
        run: pyinstaller boutikmanager.spec --clean --noconfirm

      - name: 📦 Zipper le dossier dist
        shell: pwsh
        run: |
          # CreateFromDirectory est 100% fiable : garantit UN seul BoutikManager/ à la racine du ZIP
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $src = (Resolve-Path "dist\BoutikManager").Path
          $dst = (Join-Path (Get-Location) "dist\BoutikManager-Windows.zip")
          if (Test-Path $dst) { Remove-Item $dst -Force }
          [System.IO.Compression.ZipFile]::CreateFromDirectory($src, $dst, 'Optimal', $true)

      - name: 📤 Sauvegarder le build Windows
        uses: actions/upload-artifact@v4
        with:
          name: BoutikManager-Windows
          path: dist/BoutikManager-Windows.zip
          retention-days: 30

  # ══════════════════════════════════════════
  #  CRÉER LA RELEASE GITHUB
  # ══════════════════════════════════════════
  release:
    needs: [check-version, build-mac, build-windows]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 📥 Télécharger les artifacts
        uses: actions/download-artifact@v4

      - name: 🚀 Créer la Release GitHub v${{ needs.check-version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: "BoutikManager v${{ needs.check-version.outputs.version }}"
          body: |
            ## 📦 BoutikManager v${{ needs.check-version.outputs.version }}

            | Système | Fichier | Instructions |
            |---------|---------|--------------|
            | 🍎 Mac | `BoutikManager-Mac.zip` | Extraire → clic droit sur .app → Ouvrir |
            | 🪟 Windows | `BoutikManager-Windows.zip` | Extraire → double-clic sur `BoutikManager.exe` |

            > **Mise à jour automatique** : si vous avez déjà l'application, un bouton « Installer maintenant » apparaîtra directement dans l'interface.

            **Login par défaut** : `admin` / `admin123`
          files: |
            BoutikManager-Mac/BoutikManager-Mac.zip
            BoutikManager-Windows/BoutikManager-Windows.zip
          draft: false
          prerelease: false
