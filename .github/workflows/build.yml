name: 🏗️ Build BoutikManager (PySide6)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════
  #  BUILD MAC
  # ══════════════════════════════════════════
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 📥 Télécharger le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install flask werkzeug PySide6 pyinstaller

      - name: ⚙️ Compiler pour Mac (.app bundle)
        run: pyinstaller boutikmanager.spec --clean --noconfirm

      - name: 📦 Zipper le .app
        run: |
          cd dist
          zip -r BoutikManager-Mac.zip BoutikManager.app

      - name: 📤 Sauvegarder le build Mac
        uses: actions/upload-artifact@v4
        with:
          name: BoutikManager-Mac
          path: dist/BoutikManager-Mac.zip
          retention-days: 30

  # ══════════════════════════════════════════
  #  BUILD WINDOWS
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 📥 Télécharger le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install flask werkzeug PySide6 pyinstaller

      - name: ⚙️ Compiler pour Windows
        run: pyinstaller boutikmanager.spec --clean --noconfirm

      - name: 📦 Zipper le dossier dist
        run: |
          cd dist
          Compress-Archive -Path BoutikManager -DestinationPath BoutikManager-Windows.zip

      - name: 📤 Sauvegarder le build Windows
        uses: actions/upload-artifact@v4
        with:
          name: BoutikManager-Windows
          path: dist/BoutikManager-Windows.zip
          retention-days: 30

  # ══════════════════════════════════════════
  #  CRÉER UNE RELEASE AUTOMATIQUE
  # ══════════════════════════════════════════
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Télécharger le code
        uses: actions/checkout@v4

      - name: 🔖 Lire la version depuis app.py
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r\"APP_VERSION = '([^']+)'\", open('app.py').read()); print(m.group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📥 Télécharger les artifacts
        uses: actions/download-artifact@v4

      - name: 🏷️ Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "BoutikManager v${{ env.VERSION }}"
          body: |
            ## 📦 Télécharger BoutikManager v${{ env.VERSION }}

            | Système | Fichier | Notes |
            |---------|---------|-------|
            | 🍎 Mac  | `BoutikManager-Mac.zip` | Extraire → double-clic sur .app |
            | 🪟 Windows | `BoutikManager-Windows.zip` | Extraire → lancer BoutikManager.exe |

            ### ✨ Nouveautés v2.0
            - Interface fenêtre native (PySide6) — pas de navigateur requis
            - Splash screen au démarrage
            - F11 pour plein écran, F5 pour recharger
            - Même design Bootstrap qu'avant

            ### Installation
            - **Mac** : Extraire le zip → Clic droit sur .app → Ouvrir (1ère fois)
            - **Windows** : Extraire le zip → Double-clic sur `BoutikManager.exe`

            Login par défaut : **admin** / **admin123**
          files: |
            BoutikManager-Mac/BoutikManager-Mac.zip
            BoutikManager-Windows/BoutikManager-Windows.zip
          draft: false
          prerelease: false
