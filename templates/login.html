<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — {{ settings.shop_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .shop-emoji { font-size: 3rem; line-height: 1; }
    .form-control {
      border-radius: 9px;
      border: 1.5px solid #dee2e6;
      padding: .65rem 1rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: #3b5bdb;
      box-shadow: 0 0 0 3px rgba(59,91,219,.12);
    }
    .input-group .input-group-text {
      border-radius: 9px 0 0 9px;
      background: #f8f9fa;
      border: 1.5px solid #dee2e6;
      border-right: none;
    }
    .input-group .form-control {
      border-radius: 0 9px 9px 0;
      border-left: none;
    }
    .input-group .form-control:focus { border-left: none; }
    .btn-login {
      background: linear-gradient(135deg, #3b5bdb, #2f4ac0);
      border: none;
      border-radius: 10px;
      padding: .8rem;
      font-weight: 700;
      font-size: 1rem;
      width: 100%;
      color: #fff;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,91,219,.4);
    }
    .version-badge {
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.6);
      font-size: .7rem;
      padding: .2rem .6rem;
      border-radius: 20px;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="shop-emoji mb-2">🏪</div>
      <h1 class="h4 fw-bold mb-0" style="color:#1a1a2e;">{{ settings.shop_name }}</h1>
      <p class="text-muted small mt-1 mb-0">BoutikManager — Connexion</p>
    </div>

    <!-- Alerts -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 small mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" autocomplete="on">

      <div class="mb-3">
        <label class="form-label fw-semibold text-muted small text-uppercase ls-1" for="username">
          Identifiant
        </label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-person-fill text-muted"></i>
          </span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="admin" required autofocus autocomplete="username">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold text-muted small text-uppercase" for="password">
          Mot de passe
        </label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock-fill text-muted"></i>
          </span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>
    </form>
  </div>

  <span class="version-badge">BoutikManager v2.0</span>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
